<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Actions Test</title>
</head>
<body>
    <h1>Testing JSON Actions</h1>
    <button onclick="createJSON()">Create JSON</button>
    <button onclick="stringifyJSON()">Stringify JSON</button>
    <button onclick="parseJSON()">Parse JSON</button>
    <button onclick="fetchJSON()">Fetch JSON</button>
    <button onclick="storeJSON()">Store in LocalStorage</button>
    <button onclick="retrieveJSON()">Retrieve from LocalStorage</button>
    <div id="output"></div>

    <script>
        let jsonData = null;
        let jsonString = null;

        function createJSON() {
            jsonData = { name: "Burger", type: "Fast Food", price: 5.99 };
            document.getElementById('output').innerText = 'JSON Object Created: ' + JSON.stringify(jsonData);
        }

        function stringifyJSON() {
            if (jsonData) {
                jsonString = JSON.stringify(jsonData);
                document.getElementById('output').innerText = 'Stringified JSON: ' + jsonString;
            } else {
                document.getElementById('output').innerText = 'Create JSON first.';
            }
        }

        function parseJSON() {
            if (jsonString) {
                let parsed = JSON.parse(jsonString);
                document.getElementById('output').innerText = 'Parsed JSON: ' + JSON.stringify(parsed);
            } else {
                document.getElementById('output').innerText = 'Stringify JSON first.';
            }
        }

        function fetchJSON() {
            fetch('https://jsonplaceholder.typicode.com/DarajahH/Burger-Database')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('output').innerText = 'Fetched JSON: ' + JSON.stringify(data);
                })
                .catch(error => {
                    document.getElementById('output').innerText = 'Error fetching JSON: ' + error;
                });
        }

        function storeJSON() {
            if (jsonData) {
                localStorage.setItem('burgerData', JSON.stringify(jsonData));
                document.getElementById('output').innerText = 'JSON stored in LocalStorage.';
            } else {
                document.getElementById('output').innerText = 'Create JSON first.';
            }
        }

        function retrieveJSON() {
            let stored = localStorage.getItem('burgerData');
            if (stored) {
                let retrieved = JSON.parse(stored);
                document.getElementById('output').innerText = 'Retrieved JSON: ' + JSON.stringify(retrieved);
            } else {
                document.getElementById('output').innerText = 'No JSON in LocalStorage.';
            }
        }
    </script>
</body>
</html>
